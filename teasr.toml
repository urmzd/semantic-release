[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[[output.formats]]
output_type = "gif"

[font]
family = "Iosevka Nerd Font Mono"

[[scenes]]
type = "terminal"
name = "sr-commit"
theme = "dracula"
cols = 110
rows = 40
cwd = "."

[scenes.intro]
text = "sr commit\nAI-powered atomic commits"
duration = 2000
center = true

[[scenes.interactions]]
type = "type"
text = "sr commit --dry-run"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 15000
